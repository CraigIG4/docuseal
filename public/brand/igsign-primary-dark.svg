  <path class="stroke-white" d="M160 48 L284 120 L284 264 L160 336 L36 264 L36 120 Z"/>
  <circle class="green" cx="86" cy="132" r="13"/>
  <rect class="white" x="70" y="158" width="34" height="112" rx="6"/>
  <path class="white" d="M135 162 C154 143 195 142 224 161 L198 188 C179 177 157 178 143 192 C126 210 130 240 150 255 C166 267 190 266 204 254 L204 230 L166 230 L182 204 L238 204 L238 267 C218 289 186 301 153 294 C111 285 82 248 88 207 C91 188 106 174 135 162Z"/>
  <path class="stroke-green" d="M226 265 L258 235"/>
  <path class="stroke-green" d="M226 265 L214 250"/>
</g>

</g>
<line x1="460" y1="126" x2="460" y2="382" stroke="#7B787F" stroke-width="2" opacity="0.7"/>
<text x="520" y="270" class="white word" font-size="118">IGSIGN</text>
<line x1="530" y1="338" x2="610" y2="338" stroke="#45AC34" stroke-width="4"/>
<text x="640" y="354" class="white tag" font-size="30">POWERED BY</text>
<text x="880" y="354" class="green tag" font-size="30">POSSIBILITY</text>
