<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-label="IGSIGN logo, Powered by Possibility">

<defs>
  <style>
    .navy { fill: #162B3C; }
    .white { fill: #FFFFFF; }
    .green { fill: #45AC34; }
    .grey { fill: #7B787F; }
    .stroke-white { fill: none; stroke: #FFFFFF; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
    .stroke-green { fill: none; stroke: #45AC34; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
    .word { font-family: Avenir, Arial, sans-serif; font-weight: 800; letter-spacing: 12px; }
    .tag { font-family: Avenir, Arial, sans-serif; font-weight: 500; letter-spacing: 9px; }
  </style>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
  </filter>
</defs>

<rect width="1400" height="520" fill="#162B3C"/>
<path opacity="0.12" fill="none" stroke="#FFFFFF" stroke-width="2" d="M100 60 L160 25 L220 60 L220 130 L160 165 L100 130 Z M20 210 L80 175 L140 210 L140 280 L80 315 L20 280 Z"/>
<g transform="translate(100,82) scale(0.95)" filter="url(#softShadow)">

