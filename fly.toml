# fly.toml -- IGSIGN on Fly.io (free tier)
app = "igsign-ig"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  RAILS_ENV = "production"
  PORT = "3000"
  RAILS_LOG_LEVEL = "info"
  RAILS_SERVE_STATIC_FILES = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "igsign_data"
  destination = "/app/storage"
  initial_size = "2gb"
