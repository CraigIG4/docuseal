plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  Exclude:
    - db/schema.rb
    - node_modules/**/*
    - bin/*
    - vendor/**/*
  TargetRubyVersion: '3.4'
  SuggestExtensions: false

Metrics/BlockLength:
  Exclude:
    - Rakefile
    - '**/*.rake'
    - spec/**/*
    - config/environments/**/*
    - config/routes.rb

Style/Documentation:
  Enabled: false

Lint/MissingSuper:
  Enabled: false

Metrics/ParameterLists:
  Max: 12

Metrics/MethodLength:
  Max: 30
  Exclude:
    - 'db/migrate/**'
    - 'spec/**/*'
    - 'app/controllers/agreements_controller.rb'
    - 'app/services/caf_completion_handler.rb'
    - 'app/services/caf_submission_creator.rb'

Metrics/CyclomaticComplexity:
  Max: 15
  Exclude:
    - 'app/controllers/agreements_controller.rb'
    - 'app/services/caf_completion_handler.rb'
    - 'app/services/caf_submission_creator.rb'

Metrics/PerceivedComplexity:
  Max: 15
  Exclude:
    - 'app/controllers/agreements_controller.rb'
    - 'app/services/caf_completion_handler.rb'
    - 'app/services/caf_submission_creator.rb'

Style/MultipleComparison:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Style/MinMaxComparison:
  Enabled: false

Style/EmptyClassDefinition:
  Enabled: false

Style/OneClassPerFile:
  Enabled: false

Layout/MultilineMethodCallIndentation:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Layout/LineLength:
  AllowedPatterns: ['\A\s*#']
  Exclude:
    - 'app/controllers/accounts_controller.rb'
    - 'app/controllers/embed_scripts_controller.rb'
    - 'lib/search_entries.rb'
    - 'lib/submissions/generate_audit_trail.rb'
    - 'lib/templates/create_attachments.rb'
    - 'spec/system/account_settings_spec.rb'

Metrics/AbcSize:
  Max: 45
  Exclude:
    - spec/**/*
    - 'app/controllers/agreements_controller.rb'
    - 'app/services/caf_completion_handler.rb'
    - 'app/services/caf_submission_creator.rb'

Metrics/ModuleLength:
  Max: 1000

Metrics/ClassLength:
  Max: 1000

RSpec/NestedGroups:
  Max: 6

RSpec/MultipleExpectations:
  Max: 25

RSpec/ExampleLength:
  Max: 500

RSpec/MultipleMemoizedHelpers:
  Max: 15

RSpec/AnyInstance:
  Enabled: false

Metrics/BlockNesting:
  Max: 6

Rails/I18nLocaleTexts:
  Enabled: false

Rails/FindEach:
  Enabled: false

Rails/SkipsModelValidations:
  Enabled: false

Rails/ApplicationController:
  Enabled: false

Rails/Output:
  Enabled: false

Rails/StrongParametersExpect:
  Enabled: false

Rails/RedirectBackOrTo:
  Enabled: false

Rails/UnknownEnv:
  Environments:
    - development
    - test
    - production
    - local
