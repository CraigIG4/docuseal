services:
  - type: web
    name: igsign
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: PORT
        value: "10000"
      - key: SECRET_KEY_BASE
        generateValue: true
      # INTERNAL_WEBHOOK_SECRET protects the /internal/caf_webhooks endpoint.
      # Set this to a long random string in the Render dashboard → Environment.
      - key: INTERNAL_WEBHOOK_SECRET
        sync: false
      # REDIS_URL is injected automatically by Render from the Redis service below.
      - key: REDIS_URL
        fromService:
          name: igsign-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: igsign-db
          property: connectionString

databases:
  - name: igsign-db
    databaseName: igsign
    plan: free

# Render managed Redis (replaces the broken localhost URL).
# Sidekiq and the signing-throttle middleware both connect via REDIS_URL.
redis:
  - name: igsign-redis
    plan: free
