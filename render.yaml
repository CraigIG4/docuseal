services:
  - type: web
    name: igsign
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: PORT
        value: "10000"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: DATABASE_URL
        fromDatabase:
          name: igsign-db
          property: connectionString

databases:
  - name: igsign-db
    databaseName: igsign
    plan: free
